name: Backend CI/CD

on:
  push:
    branches: [main]

jobs:
  verify-build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sekawan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_mysql

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate Key
        run: php artisan key:generate

      - name: Wait for MySQL
        run: sleep 15

      - name: Run Migration
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: sekawan_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Cache Config
        run: php artisan config:cache

      - name: Cache Routes
        run: php artisan route:cache

  build-and-deploy:
    needs: verify-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sekawan-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sekawan-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /srv/sekawan
            export IMAGE_TAG=${{ github.sha }}
            docker compose pull

            docker exec sekawan-backend php artisan down || true

            docker compose up -d backend queue-worker --force-recreate --pull always

            docker exec sekawan-backend php artisan migrate --force
            docker exec sekawan-backend php artisan config:cache
            docker exec sekawan-backend php artisan route:cache

            docker exec sekawan-backend php artisan up

            docker image prune -f
